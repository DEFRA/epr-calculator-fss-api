trigger: none
pr: none
pool: DEFRA-COMMON-UBUNTU-SSV3
appendCommitMessageToRunName: false
name: 'Deploy code to $(serviceName)'

parameters:
- name: teamName
  displayName: 'Select Environment Name:    (works only with "development" as target env)'
  default: 'DEV11'
  type: string
  values:
    - DEV1
    - DEV2
    - DEV3
    - DEV6
    - DEV7
    - DEV8
    - DEV9
    - DEV11
    - DEV12
    - DEV13
    - DEV14
    - DEV16

- name: envToDeploy
  displayName: 'Target Environment to deploy:'
  default: development
  type: string
  values:
    - development
    - dev15
    - tst
    - preprod
    - preprod2
    - prod
- name: imageTag
  displayName: Enter Tag for the Image (Docker tag)
  default: ''
  type: string

variables:
  - ${{ if eq(parameters.envToDeploy, 'development') }}:
    - name: env
      value: DEV1
    - template: vars/${{ parameters.teamName }}-${{ parameters.envToDeploy }}.yaml
  - ${{ elseif eq(parameters.envToDeploy, 'tst') }}:
    - name: env
      value: TST1
    - template: vars/${{ parameters.envToDeploy }}.yaml
  - ${{ elseif eq(parameters.envToDeploy, 'preprod') }}:
    - name: env
      value: PRE1
    - template: vars/${{ parameters.envToDeploy }}.yaml
  - ${{ elseif eq(parameters.envToDeploy, 'preprod2') }}:
    - name: env
      value: PRE2
    - template: vars/${{ parameters.envToDeploy }}.yaml
  - ${{ elseif eq(parameters.envToDeploy, 'prod') }}:
    - name: env
      value: PRD1
    - template: vars/${{ parameters.envToDeploy }}.yaml

resources:
  repositories:
    - repository: CommonTemplates
      name: defra/epr-webapps-code-deploy-templates
      type: github
      endpoint: defra
      ref: main

extends:
  template: epr-deployment-pipeline.yaml@CommonTemplates
  parameters:
    envToDeploy: ${{ parameters.envToDeploy }}
    imageTag: ${{ parameters.imageTag }}
    azureSubscription: $(azureSubscription)
    acrName: $(acr.azureContainerRegistryName)
    registryName: $(acr.repositoryName)
    serviceName: $(serviceName)
    ${{ if eq(parameters.envToDeploy, 'development') }}:
      targetEnvironment: 'development'
    ${{ else }}:
      targetEnvironment: '$(env)'
